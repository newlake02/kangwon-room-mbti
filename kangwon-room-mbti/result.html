<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결과 | 내 원룸 MBTI</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

  <header class="site-header">
    <span class="logo-text">🏠 강원대 원룸 MBTI</span>
  </header>

  <main class="page-wrap">

    <!-- ① 유형 코드 + 별명 카드 -->
    <div class="card" style="text-align:center;">
      <p class="result-room-name" id="resultRoomName"></p>
      <div class="type-emoji" id="typeEmoji"></div>
      <div class="type-code"     id="typeCode"></div>
      <div class="type-nickname" id="typeNickname"></div>
    </div>

    <!-- ② 4축 퍼센트 바 카드 -->
    <div class="card">
      <p class="score-section-title">유형 분석</p>
      <div id="axisRows"></div>
    </div>

    <!-- ③ 유형 설명 카드 -->
    <div class="card">
      <p class="score-section-title">원룸 설명</p>
      <p class="result-description" id="resultDescription"></p>
    </div>

    <!-- ④ 액션 버튼 -->
    <div class="action-group" style="display:flex; flex-direction:column; gap:10px;">
      <button class="btn-primary"   onclick="location.href='index.html'">다른 원룸 진단하기</button>
      <button class="btn-secondary" onclick="location.href='search.html'">🔍 원룸 결과 검색하기</button>
      <!-- 나중에 결과 공유 기능 추가 예정 -->
      <button class="btn-secondary" id="shareBtn">🔗 결과 공유하기</button>
    </div>

  </main>

  <footer class="site-footer">강원대학교 원룸 주거환경 정보 서비스</footer>

  <script src="questions.js"></script>
  <script src="scoring.js"></script>
  <script src="firebase.js"></script>
  <script>
    // ── 세션 복원 ──────────────────────────────────────────
    const roomName  = sessionStorage.getItem('roomName');
    const rawAnswers = sessionStorage.getItem('answers');
    if (!roomName || !rawAnswers) { location.href = 'index.html'; }

    const answers   = JSON.parse(rawAnswers);
    const typeName  = calculateType(answers);
    const typeInfo  = TYPE_INFO[typeName];
    const { raw, axes } = getAxisScores(answers);

    // ── ① 유형 코드 + 별명 ────────────────────────────────
    document.getElementById('resultRoomName').textContent = `📍 ${roomName}`;
    document.getElementById('typeEmoji').textContent       = typeInfo.emoji;
    document.getElementById('typeCode').textContent        = typeName;
    document.getElementById('typeCode').style.color        = typeInfo.color;
    document.getElementById('typeNickname').textContent    = typeInfo.nickname;

    // ── ② 4축 퍼센트 바 ──────────────────────────────────
    const axisContainer = document.getElementById('axisRows');
    axes.forEach(({ left, right, leftLabel, rightLabel, axisName, leftPct, rightPct, winner }) => {
      const lWin = winner === left;
      const block = document.createElement('div');
      block.className = 'axis-block';
      block.innerHTML = `
        <p class="axis-name">${axisName}</p>
        <div class="axis-row">
          <!-- 왼쪽: [글자] [라벨] [퍼센트] -->
          <div class="axis-left-group">
            <span class="axis-letter-tag ${lWin ? 'is-winner' : ''}">${left}</span>
            <span class="axis-label-text ${lWin ? 'is-winner' : ''}">${leftLabel}</span>
            <span class="axis-pct-num   ${lWin ? 'is-winner' : ''}">${leftPct}%</span>
          </div>
          <!-- 바 -->
          <div class="axis-track">
            <div class="axis-fill" data-pct="${leftPct}"></div>
          </div>
          <!-- 오른쪽: [퍼센트] [라벨] [글자] -->
          <div class="axis-right-group">
            <span class="axis-pct-num   ${!lWin ? 'is-winner' : ''}">${rightPct}%</span>
            <span class="axis-label-text ${!lWin ? 'is-winner' : ''}">${rightLabel}</span>
            <span class="axis-letter-tag ${!lWin ? 'is-winner' : ''}">${right}</span>
          </div>
        </div>
      `;
      axisContainer.appendChild(block);
    });

    // ── ③ 설명 ───────────────────────────────────────────
    document.getElementById('resultDescription').textContent = typeInfo.description;

    // 축 바 애니메이션: width=0에서 실제 값으로 transition 실행
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.axis-fill[data-pct]').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      });
    });

    // ── Firestore 저장 ────────────────────────────────────
    (async function saveToFirestore() {
      try {
        const address = sessionStorage.getItem('address') || '';
        const lat     = parseFloat(sessionStorage.getItem('lat'))  || null;
        const lng     = parseFloat(sessionStorage.getItem('lng'))  || null;
        if (!address || !lat || !lng) return; // 주소 정보 없으면 저장 생략

        // 문서 ID: 도로명주소(공백제거)_건물명 예) 강원대학로1_모아빌
        const docId = address.replace(/\s+/g, '') + '_' + roomName.replace(/\s+/g, '');

        // 원룸 문서 생성 or 업데이트 (merge)
        await db.collection('rooms').doc(docId).set({
          buildingName: roomName,
          address:      address,
          lat:          lat,
          lng:          lng
        }, { merge: true });

        // 응답 서브컬렉션에 추가
        await db.collection('rooms').doc(docId).collection('responses').add({
          mbtiType:  typeName,
          scores:    raw,   // { E, I, S, N, T, F, J, P }
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        console.log('✅ Firestore 저장 완료:', docId);
      } catch (e) {
        console.error('❌ Firestore 저장 실패:', e);
      }
    })();

    // ── 공유 버튼 ─────────────────────────────────────────
    // 나중에 실제 공유 URL로 교체 예정
    document.getElementById('shareBtn').addEventListener('click', () => {
      const text = `강원대 원룸 MBTI\n📍 ${roomName}\n${typeInfo.emoji} ${typeName} · ${typeInfo.nickname}\n${typeInfo.description}`;
      if (navigator.share) {
        navigator.share({ title: '내 원룸 MBTI', text });
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사되었어요!'));
      } else {
        alert(text);
      }
    });
  </script>

</body>
</html>
