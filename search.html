<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>원룸 지도 | 내 원룸 MBTI</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="search-page">

  <header class="site-header search-header">
    <span class="logo-text">🏠 강원대 원룸 MBTI</span>
    <a href="index.html" class="header-cta">진단하기 →</a>
  </header>

  <!-- 지도 컨테이너 -->
  <div id="map"></div>

  <!-- 지도 타입 전환 버튼 -->
  <div class="map-type-btns">
    <button id="btnRoadmap" class="map-type-btn active" onclick="setMapType('roadmap')">일반지도</button>
    <button id="btnHybrid"  class="map-type-btn"        onclick="setMapType('hybrid')">위성지도</button>
  </div>

  <!-- 지도 위 안내 툴팁 -->
  <div class="map-hint" id="mapHint">마커를 클릭하면 원룸 정보를 볼 수 있어요</div>

  <!-- 로딩 오버레이 -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>원룸 데이터를 불러오는 중...</p>
  </div>

  <!-- 데이터 없음 상태 -->
  <div id="emptyMap" class="map-empty-state" style="display:none;">
    <span style="font-size:2rem;">🏘️</span><br>
    아직 등록된 원룸이 없어요.<br>
    첫 번째로 진단해 보세요!
  </div>

  <!-- 딤 오버레이 (패널 바깥 클릭 시 닫기) -->
  <div id="dimOverlay" class="dim-overlay" onclick="closeAllPanels()"></div>

  <!-- ── 원룸 목록 패널 (클러스터 클릭 시) ── -->
  <div id="listPanel" class="bottom-panel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <h3 id="listPanelTitle">이 지역 원룸</h3>
      <button class="panel-close-btn" onclick="closeAllPanels()">✕</button>
    </div>
    <div id="roomList" class="room-list"></div>
  </div>

  <!-- ── 원룸 상세 패널 ── -->
  <div id="detailPanel" class="bottom-panel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <button class="panel-back-btn" id="backBtn" onclick="backToList()" style="display:none;">← 목록</button>
      <h3 id="detailTitle"></h3>
      <button class="panel-close-btn" onclick="closeAllPanels()">✕</button>
    </div>
    <div id="detailContent" class="detail-content"></div>
  </div>

  <script src="scoring.js"></script>
  <script src="firebase.js"></script>
  <script>
    // ── 상태 변수 ────────────────────────────────────────────
    let map, clusterer;
    let fromCluster = false;  // 클러스터 → 목록 → 상세 경로 여부

    // ── 지도 타입 전환 ────────────────────────────────────────
    function setMapType(type) {
      if (!map) return;
      if (type === 'hybrid') {
        map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
        document.getElementById('btnHybrid').classList.add('active');
        document.getElementById('btnRoadmap').classList.remove('active');
      } else {
        map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
        document.getElementById('btnRoadmap').classList.add('active');
        document.getElementById('btnHybrid').classList.remove('active');
      }
    }

    // ── 지도 초기화 (kakao.maps.load 콜백) ───────────────────
    function initKakaoMap() {
      var container = document.getElementById('map');
      var options   = {
        center: new kakao.maps.LatLng(37.8680, 127.7447),
        level:  4
      };
      map = new kakao.maps.Map(container, options);

      // 마커 클러스터러
      clusterer = new kakao.maps.MarkerClusterer({
        map,
        averageCenter:    true,
        minLevel:         3,
        disableClickZoom: true,    // 클러스터 클릭 시 자동 줌 비활성화
        styles: [{
          width:        '44px',
          height:       '44px',
          background:   'rgba(43,181,160,0.88)',
          borderRadius: '50%',
          color:        '#fff',
          textAlign:    'center',
          fontWeight:   '800',
          lineHeight:   '44px',
          fontSize:     '14px',
          boxShadow:    '0 2px 8px rgba(43,181,160,0.45)'
        }]
      });

      // 클러스터 클릭 → 목록 패널
      kakao.maps.event.addListener(clusterer, 'clusterclick', function (cluster) {
        const rooms = cluster.getMarkers().map(m => m._roomData).filter(Boolean);
        showListPanel(rooms);
      });

      loadRoomsFromFirestore();

      // 지도 힌트 3초 후 숨기기
      setTimeout(() => {
        const hint = document.getElementById('mapHint');
        if (hint) hint.style.opacity = '0';
      }, 3000);
    }

    // ── Kakao SDK 동적 로딩 ───────────────────────────────────
    function loadKakaoSDK() {
      return new Promise(function (resolve) {
        var script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=9b0d26f8211aa8ac99bb7b61635eb4ce&libraries=services,clusterer&autoload=false';
        script.onload = function () {
          kakao.maps.load(function () { resolve(); });
        };
        document.head.appendChild(script);
      });
    }

    window.addEventListener('load', function () {
      loadKakaoSDK().then(function () {
        initKakaoMap();
      });
    });

    // ── Firestore에서 원룸 데이터 로드 ───────────────────────
    async function loadRoomsFromFirestore() {
      try {
        const snapshot = await db.collection('rooms').get();
        const markers  = [];

        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          if (!data.lat || !data.lng) return;

          const room   = { id: docSnap.id, ...data };
          const marker = new kakao.maps.Marker({
            position: new kakao.maps.LatLng(data.lat, data.lng),
            title:    data.address
          });
          marker._roomData = room;

          // 단일 마커 클릭 → 바로 상세 패널
          kakao.maps.event.addListener(marker, 'click', function () {
            fromCluster = false;
            openDetailPanel(room);
          });

          markers.push(marker);
        });

        document.getElementById('loadingOverlay').style.display = 'none';

        if (markers.length === 0) {
          document.getElementById('emptyMap').style.display = 'flex';
        } else {
          clusterer.addMarkers(markers);
        }
      } catch (e) {
        console.error('원룸 데이터 로드 실패:', e);
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    // ── 목록 패널 열기 ───────────────────────────────────────
    function showListPanel(rooms) {
      fromCluster = true;
      document.getElementById('listPanelTitle').textContent = `이 지역 원룸 ${rooms.length}곳`;
      const listEl = document.getElementById('roomList');
      listEl.innerHTML = '';

      rooms.forEach(room => {
        const item = document.createElement('div');
        item.className = 'room-list-item';
        item.innerHTML = `
          <span class="room-list-icon">🏠</span>
          <div class="room-list-info">
            <div class="room-list-name">${room.address || ''}</div>
          </div>
          <span class="room-list-arrow">›</span>
        `;
        item.addEventListener('click', () => openDetailPanel(room));
        listEl.appendChild(item);
      });

      openPanel('listPanel');
    }

    // ── 상세 패널 열기 ───────────────────────────────────────
    function openDetailPanel(room) {
      document.getElementById('detailTitle').textContent = room.address || '';
      document.getElementById('backBtn').style.display   = fromCluster ? 'block' : 'none';
      document.getElementById('detailContent').innerHTML = `
        <div style="text-align:center; padding:28px; color:var(--text-light);">
          <div class="loading-spinner" style="margin:0 auto 12px;"></div>분석 중...
        </div>`;
      openPanel('detailPanel');
      fetchAndRenderDetail(room);
    }

    // ── Firestore에서 응답 데이터 로드 후 렌더링 ────────────
    async function fetchAndRenderDetail(room) {
      try {
        const snapshot  = await db.collection('rooms').doc(room.id)
                                  .collection('responses').get();
        const responses = [];
        snapshot.forEach(d => responses.push(d.data()));
        renderDetailContent(room, responses);
      } catch (e) {
        document.getElementById('detailContent').innerHTML =
          `<div style="text-align:center; padding:24px; color:#e07b7b;">데이터를 불러올 수 없어요.</div>`;
      }
    }

    // ── 상세 패널 렌더링 ──────────────────────────────────────
    function renderDetailContent(room, responses) {
      const content = document.getElementById('detailContent');

      if (responses.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">📊</span>
            아직 응답 데이터가 없어요.
          </div>`;
        return;
      }

      // 유형별 집계 (내림차순)
      const typeCounts = {};
      responses.forEach(r => { if (r.mbtiType) typeCounts[r.mbtiType] = (typeCounts[r.mbtiType] || 0) + 1; });
      const sortedTypes = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);

      // 유형 분포 HTML (상위 3개)
      const typeRanksHtml = sortedTypes.slice(0, 3).map(([type, cnt], i) => {
        const info = TYPE_INFO[type] || { emoji: '🏠', nickname: type, color: 'var(--mint-dark)' };
        return `
          <div class="type-rank-row">
            <div class="rank-badge">${i + 1}</div>
            <span class="rank-emoji">${info.emoji}</span>
            <div class="rank-info">
              <span class="rank-code" style="color:${info.color};">${type}</span>
              <span class="rank-name">${info.nickname}</span>
            </div>
            <span class="rank-count">${cnt}명</span>
          </div>`;
      }).join('');

      // 평균 축 바 HTML
      const axisData     = getAvgAxisFromResponses(responses);
      const axisBarsHtml = axisData.map(({ left, right, leftLabel, rightLabel, axisName, leftPct, rightPct, winner }) => {
        const lWin = winner === left;
        return `
          <div class="axis-block" style="margin-bottom:14px;">
            <p class="axis-name">${axisName}</p>
            <div class="axis-row">
              <div class="axis-left-group">
                <span class="axis-letter-tag ${lWin ? 'is-winner' : ''}">${left}</span>
                <span class="axis-label-text ${lWin ? 'is-winner' : ''}">${leftLabel}</span>
                <span class="axis-pct-num   ${lWin ? 'is-winner' : ''}">${leftPct}%</span>
              </div>
              <div class="axis-track">
                <div class="axis-fill-left"  style="width:${leftPct}%;"></div>
                <div class="axis-fill-right" style="width:${rightPct}%;"></div>
              </div>
              <div class="axis-right-group">
                <span class="axis-pct-num   ${!lWin ? 'is-winner' : ''}">${rightPct}%</span>
                <span class="axis-label-text ${!lWin ? 'is-winner' : ''}">${rightLabel}</span>
                <span class="axis-letter-tag ${!lWin ? 'is-winner' : ''}">${right}</span>
              </div>
            </div>
          </div>`;
      }).join('');

      // 대표 유형
      const repType = sortedTypes[0][0];
      const repInfo = TYPE_INFO[repType] || { emoji: '🏠', nickname: repType, color: 'var(--mint-dark)' };

      content.innerHTML = `
        <!-- 요약 뱃지 -->
        <div class="detail-summary">
          <span class="summary-chip">총 ${responses.length}명 응답</span>
          <span class="summary-chip" style="color:${repInfo.color}; border-color:${repInfo.color};">
            ${repInfo.emoji} ${repType} · ${repInfo.nickname}
          </span>
        </div>

        <!-- 유형 분포 -->
        <p class="score-section-title" style="margin-top:20px;">유형 분포</p>
        <div class="type-rank-list">${typeRanksHtml}</div>

        <!-- 축별 평균 -->
        <p class="score-section-title" style="margin-top:20px;">유형별 평균 성향</p>
        ${axisBarsHtml}

        <!-- 대표 유형 설명 -->
        <p class="score-section-title" style="margin-top:20px;">대표 유형 설명</p>
        <div class="rep-desc-box">
          <p class="rep-desc-text">${repInfo.description || ''}</p>
          <button class="rep-desc-more" onclick="toggleRepDesc(this)">더보기 ▾</button>
        </div>
      `;
    }

    // ── 대표 유형 설명 더보기 토글 ───────────────────────────
    function toggleRepDesc(btn) {
      const text = btn.previousElementSibling;
      const expanded = text.classList.toggle('expanded');
      btn.textContent = expanded ? '접기 ▴' : '더보기 ▾';
    }

    // ── 패널 열기/닫기 헬퍼 ──────────────────────────────────
    function openPanel(id) {
      document.querySelectorAll('.bottom-panel').forEach(p => p.classList.remove('open'));
      document.getElementById(id).classList.add('open');
      document.getElementById('dimOverlay').classList.add('active');
    }

    function closeAllPanels() {
      document.querySelectorAll('.bottom-panel').forEach(p => p.classList.remove('open'));
      document.getElementById('dimOverlay').classList.remove('active');
    }

    function backToList() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('listPanel').classList.add('open');
    }
  </script>

</body>
</html>
