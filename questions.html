<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>질문 | 내 원룸 MBTI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <span class="logo-text">🏠 강원대 원룸 MBTI</span>
  </header>

  <main class="page-wrap">

    <!-- 진행 상황 -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">1 / 10</span>
        <span id="categoryText">편의성</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 10%;"></div>
      </div>
    </div>

    <!-- 질문 카드 -->
    <div class="card" id="questionCard">
      <div>
        <span class="question-number" id="questionNumber">Q1</span>
        <span class="question-category-badge" id="questionCategory">편의성</span>
      </div>
      <p class="question-text" id="questionText">질문을 불러오는 중…</p>

      <!-- 5점 척도 선택지 — 나중에 SCALE_OPTIONS로 동적 생성 유지 -->
      <div class="scale-options" id="scaleOptions"></div>

      <div class="error-msg" id="answerError">선택지를 골라주세요.</div>
    </div>

    <!-- 이전 / 다음 버튼 -->
    <div class="nav-buttons">
      <button class="btn-secondary" id="prevBtn">← 이전</button>
      <button class="btn-primary"   id="nextBtn">다음 →</button>
    </div>

  </main>

  <footer class="site-footer">
    강원대학교 원룸 주거환경 정보 서비스
  </footer>

  <!-- 질문 목록 및 척도 데이터 -->
  <script src="questions.js"></script>
  <script>
    // 세션에서 주소 확인 — 없으면 처음으로
    const address = sessionStorage.getItem('address');
    if (!address) location.href = 'index.html';

    // 답변 배열 초기화 (null = 미답변)
    // 나중에 Firebase에 중간 저장 로직 추가 예정
    let answers = new Array(QUESTIONS.length).fill(null);
    let current = 0;

    const totalQ = QUESTIONS.length;

    function renderQuestion(idx) {
      const q = QUESTIONS[idx];

      // 진행 표시 업데이트
      document.getElementById('progressText').textContent = `${idx + 1} / ${totalQ}`;
      document.getElementById('categoryText').textContent = q.group;
      document.getElementById('progressFill').style.width = `${((idx + 1) / totalQ) * 100}%`;

      // 질문 내용
      document.getElementById('questionNumber').textContent = `Q${idx + 1}`;
      document.getElementById('questionCategory').textContent = q.group;
      document.getElementById('questionText').textContent = q.text;

      // 선택지 동적 렌더링 (SCALE_OPTIONS 배열 기반)
      const container = document.getElementById('scaleOptions');
      container.innerHTML = '';
      SCALE_OPTIONS.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'scale-option' + (answers[idx] === opt.value ? ' selected' : '');

        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'scale';
        radio.value = opt.value;
        if (answers[idx] === opt.value) radio.checked = true;

        radio.addEventListener('change', () => {
          answers[idx] = opt.value;
          document.querySelectorAll('.scale-option').forEach(el => el.classList.remove('selected'));
          label.classList.add('selected');
          document.getElementById('answerError').classList.remove('visible');
        });

        const span = document.createElement('span');
        span.className = 'scale-label';
        span.textContent = opt.label;

        label.appendChild(radio);
        label.appendChild(span);
        container.appendChild(label);
      });

      // 이전 버튼 표시 제어
      document.getElementById('prevBtn').style.visibility = idx === 0 ? 'hidden' : 'visible';
      // 마지막 질문이면 버튼 텍스트 변경
      document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '결과 보기 →' : '다음 →';

      document.getElementById('answerError').classList.remove('visible');
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (answers[current] === null) {
        document.getElementById('answerError').classList.add('visible');
        return;
      }
      if (current < totalQ - 1) {
        current++;
        renderQuestion(current);
      } else {
        // 모든 답변 완료 — 세션에 저장 후 결과 페이지로 이동
        // 나중에 Firebase에 결과 저장 로직 추가 예정
        sessionStorage.setItem('answers', JSON.stringify(answers));
        location.href = 'result.html';
      }
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (current > 0) {
        current--;
        renderQuestion(current);
      }
    });

    // 초기 렌더
    renderQuestion(0);
  </script>

</body>
</html>
